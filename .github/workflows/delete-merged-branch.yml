name: Delete merged PR branch

# Auto-deletes a PR's head branch once the PR is merged, keeping the
# branch list clean. Equivalent to the repo's native "Automatically delete
# head branches" setting, implemented as a workflow so it lives in-repo.

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  delete-branch:
    # Only run for merged PRs whose head branch lives in this repo
    # (never touch branches on forks).
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const ref = `heads/${context.payload.pull_request.head.ref}`;
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref,
              });
              core.info(`Deleted ${ref}`);
            } catch (error) {
              // Branch may already be gone (e.g. native auto-delete won the race).
              core.info(`Skipping ${ref}: ${error.message}`);
            }
